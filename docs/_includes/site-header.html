{% comment %}
  Top bar: home, search (Pagefind), theme toggle. Hidden on print.
{% endcomment %}
<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-header__brand site-header__brand--logo" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" height="28" width="28" aria-hidden="true" focusable="false" class="site-header__logo-icon">
        <circle cx="16" cy="16" r="13.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="10" cy="20" r="2" fill="currentColor"/>
        <circle cx="16" cy="10" r="2" fill="currentColor"/>
        <circle cx="22" cy="20" r="2" fill="currentColor"/>
        <circle cx="16" cy="23" r="2" fill="currentColor"/>
        <line x1="10" y1="20" x2="16" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <line x1="16" y1="10" x2="22" y2="20" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <line x1="10" y1="20" x2="16" y2="23" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <line x1="22" y1="20" x2="16" y2="23" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
        <line x1="10" y1="20" x2="22" y2="20" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
      </svg>
    </a>
    <div class="site-header__actions">
      <a class="site-header__btn site-header__btn--about" href="{{ '/about' | relative_url }}" style="text-decoration:none">About</a>
      <a class="site-header__btn site-header__btn--about" href="{{ '/assignments' | relative_url }}" style="text-decoration:none">Assignments</a>
      <button type="button" class="site-header__btn" id="site-search-open" aria-haspopup="dialog" aria-controls="site-search-dialog" aria-label="Open search">
        Search
      </button>
      <button type="button" class="site-header__btn site-header__btn--theme" id="theme-toggle" aria-label="Toggle dark mode" title="Theme">
        <span class="site-header__theme-icon" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>

<div class="site-search" id="site-search-dialog" role="dialog" aria-modal="true" aria-labelledby="site-search-title" hidden>
  <div class="site-search__backdrop" id="site-search-backdrop" tabindex="-1"></div>
  <div class="site-search__panel">
    <div class="site-search__head">
      <h2 class="site-search__title" id="site-search-title">Search lessons</h2>
      <button type="button" class="site-search__close" id="site-search-close" aria-label="Close search">×</button>
    </div>
    <div id="pagefind-ui-root" class="site-search__mount"></div>
    <p class="site-search__hint text-small text-gray" id="pagefind-unavailable" hidden>Search index is generated on full site build (<code>pnpm run build:jekyll-with-search</code>, or <code>make search</code> / <code>make jekyll-build-with-search</code> from <code>docs/</code>).</p>
  </div>
</div>
