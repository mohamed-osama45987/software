<link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="32x32">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="apple-touch-icon-precomposed" href="{{ '/apple-touch-icon-precomposed.png' | relative_url }}">
<link rel="manifest" href="{{ '/assets/manifest.webmanifest' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
