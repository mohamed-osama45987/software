<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 32" height="28" aria-label="Data Science and AI">
  <!-- Icon mark: neural network nodes in a circle -->
  <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- Nodes -->
  <circle cx="10" cy="19" r="2" fill="currentColor"/>
  <circle cx="16" cy="10" r="2" fill="currentColor"/>
  <circle cx="22" cy="19" r="2" fill="currentColor"/>
  <circle cx="16" cy="22" r="2" fill="currentColor"/>
  <!-- Connections -->
  <line x1="10" y1="19" x2="16" y2="10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="10" x2="22" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="19" x2="16" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="19" x2="16" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="10" y1="19" x2="22" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Wordmark -->
  <text x="36" y="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="currentColor" letter-spacing="0.5">DATA SCIENCE</text>
  <text x="36" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="400" fill="currentColor" letter-spacing="1" opacity="0.7">&amp; ARTIFICIAL INTELLIGENCE</text>
</svg>
